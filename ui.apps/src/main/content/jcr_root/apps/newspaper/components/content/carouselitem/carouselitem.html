<sly data-sly-use.model="com.fa.core.models.CarouselItemModel">

    <script data-sly-test="${model.jsonLd}"
            type="application/ld+json">${model.jsonLd @ context='unsafe'}</script>

    <article class="nc-slide"
             data-sly-test="${model.configured || wcmmode.edit}"
             data-sly-attribute.style="${model.categoryStyle}">

        <a class="nc-slide__cover-link"
           href="${model.link @ context='uri'}"
           aria-hidden="true"
           tabindex="-1"></a>

        <div class="nc-slide__media" data-sly-test="${model.imageSrc}">
            <img class="nc-slide__img"
                 src="${model.imageSrc @ context='uri'}"
                 alt="${model.imageAlt @ context='attribute'}"
                 loading="lazy"
                 decoding="async"/>
        </div>

        <div class="nc-slide__content">

            <span class="nc-slide__pretitle"
                  data-sly-test="${model.category}">${model.category @ context='text'}</span>

            <h2 class="nc-slide__title" data-sly-test="${model.title}">
                <a class="nc-slide__title-link"
                   href="${model.link @ context='uri'}">
                    ${model.title @ context='text'}
                </a>
            </h2>

            <div class="nc-slide__meta"
                 data-sly-test="${model.author || model.timeAgo}">
                <span class="nc-slide__author"
                      data-sly-test="${model.author}">${model.author @ context='text'}</span>
                <time class="nc-slide__time"
                      datetime="${model.isoDate @ context='attribute'}"
                      data-sly-test="${model.timeAgo}">${model.timeAgo @ context='text'}</time>
            </div>

        </div>

        <div class="nc-slide__placeholder"
             data-sly-test="${wcmmode.edit && !model.configured}">
            Select an article page in the dialog to configure this slide.
        </div>

    </article>

</sly>
