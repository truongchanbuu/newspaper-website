<sly data-sly-use.slide="com.fa.core.models.CarouselItemModel"/>

<!--/* Configured slide */-->
<article class="nc-slide" data-sly-test="${slide.configured}">

    <div class="nc-slide__media">
        <img class="nc-slide__img"
             src="${slide.imageSrc @ context='uri'}"
             alt="${slide.imageAlt @ context='text'}"
             loading="lazy"
             data-sly-test="${slide.imageSrc}"/>
        <div class="nc-slide__placeholder"
             data-sly-test="${!slide.imageSrc}">No image available</div>
    </div>

    <div class="nc-slide__content">

        <!--/* Category pretitle: dialog override takes priority, then tag-resolved label */-->
        <a class="nc-slide__pretitle"
           href="${slide.sectionLink @ context='uri'}"
           data-sly-test="${slide.category}">${slide.category @ context='text'}</a>

        <sly data-sly-test="${!slide.category && slide.sectionDisplay}">
            <a class="nc-slide__pretitle"
               href="${slide.sectionLink @ context='uri'}">${slide.sectionDisplay @ context='text'}</a>
        </sly>

        <h2 class="nc-slide__title">
            <a class="nc-slide__title-link"
               href="${slide.link @ context='uri'}">${slide.title @ context='text'}</a>
        </h2>

        <div class="nc-slide__meta">
            <span class="nc-slide__author"
                  data-sly-test="${slide.author}">${slide.author @ context='text'}</span>
            <time class="nc-slide__time"
                  datetime="${slide.isoDate @ context='attribute'}"
                  data-sly-test="${slide.timeAgo}">${slide.timeAgo @ context='text'}</time>
        </div>

    </div>

</article>

<!--/* Edit-mode placeholder when articlePath is not yet configured */-->
<div class="nc-slide__placeholder"
     data-sly-test="${wcmmode.edit && !slide.configured}">
    <p>Carousel slide — open the dialog and select an article page.</p>
</div>
