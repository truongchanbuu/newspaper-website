<sly data-sly-use.listing="com.fa.core.models.ArticleListingModel"
    data-sly-use.styles="core/wcm/components/commons/v1/templates.html"
    data-sly-use.cardTemplate="${'newspaper/components/content/articlecard/template.html'}">

    <section class="article-listing ${styles.toString}"
             data-sly-test="${wcmmode.edit || listing.hasItems}">

        <header class="l-section-header">
            <h2 class="l-section-header__title">${listing.displayTitle}</h2>
        </header>

        <ul class="article-listing__items"
            data-sly-test="${listing.hasItems}">
            <sly data-sly-repeat.article="${listing.cards}">
                <li>
                    <sly data-sly-call="${cardTemplate.card @
                        title=article.title,
                        link=article.link,
                        imageSrc=article.imageSrc,
                        imageAlt=article.title,
                        categoryLabel=article.category,
                        categoryLink=article.categoryLink,
                        description=article.description,
                        author=article.author,
                        formattedDate=article.formattedDate,
                        isoDate=article.isoDate,
                        timeAgo=article.timeAgo}"/>
                </li>
            </sly>
        </ul>

        <div class="article-listing__placeholder cq-placeholder"
             data-sly-test="${wcmmode.edit && !listing.hasItems}">
            <p>No articles found. Ensure articles exist under this language and are published.</p>
        </div>

    </section>
</sly>
