<sly data-sly-use.articleCard="com.fa.core.models.ArticleCardModel"
    data-sly-use.styles="core/wcm/components/commons/v1/templates/template.html"
    data-sly-use.cardTemplate="template.html">

    <sly data-sly-test="${!articleCard.empty}">
        <div class="${styles.toString}">
            <sly data-sly-call="${cardTemplate.card @
                title=articleCard.title,
                link=articleCard.link,
                imageSrc=articleCard.imageSrc,
                imageAlt=articleCard.imageAlt,
                categoryLabel=articleCard.sectionDisplay,
                categoryLink=articleCard.sectionLink,
                description=articleCard.summary,
                author=articleCard.author,
                formattedDate=articleCard.formattedDate,
                isoDate=articleCard.isoDate,
                timeAgo=articleCard.timeAgo}"/>
        </div>
    </sly>

    <div class="article-card article-card--placeholder cq-placeholder"
         data-sly-test="${articleCard.empty}">
        <p>Configure News Item — set a headline and select a category.</p>
    </div>

</sly>
