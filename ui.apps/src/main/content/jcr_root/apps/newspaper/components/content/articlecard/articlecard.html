<sly data-sly-use.articleCard="com.fa.core.models.ArticleCardModel"
    data-sly-use.styles="core/wcm/components/commons/v1/templates/styles.html">

    <sly data-sly-test="${!articleCard.empty}">
        <div class="${styles.toString}">
            <article class="article-card" data-component="article-card">

                <div class="article-card__media ${!articleCard.imageSrc ? 'article-card__media--placeholder' : ''}">
                    <sly data-sly-test="${articleCard.imageSrc}">
                        <img class="article-card__image"
                             src="${articleCard.imageSrc @ context='uri'}"
                             alt="${articleCard.imageAlt @ context='attribute'}"
                             loading="lazy" />
                    </sly>
                </div>

                <div class="article-card__body">
                    <sly data-sly-test="${articleCard.section}">
                        <a class="article-card__section-label article-card__section-label--${articleCard.section}"
                           href="${articleCard.sectionLink @ context='uri'}">
                            ${articleCard.sectionDisplay}
                        </a>
                    </sly>

                    <h3 class="article-card__headline line-clamp">
                        <a class="article-card__headline-link"
                           href="${articleCard.link @ context='uri'}">
                            ${articleCard.title}
                        </a>
                    </h3>

                    <sly data-sly-test="${articleCard.summary}">
                        <p class="article-card__trail line-clamp">${articleCard.summary}</p>
                    </sly>

                    <footer class="article-card__meta">
                        <sly data-sly-test="${articleCard.author}">
                            <span class="article-card__byline">
                                By <span class="article-card__author">${articleCard.author}</span>
                            </span>
                        </sly>

                        <sly data-sly-test="${articleCard.timeAgo}">
                            <time class="article-card__time-ago"
                                  datetime="${articleCard.isoDate}"
                                  title="${articleCard.formattedDate}">
                                ${articleCard.timeAgo}
                            </time>
                        </sly>

                        <sly data-sly-test="${articleCard.formattedDate && !articleCard.timeAgo}">
                            <time class="article-card__date"
                                  datetime="${articleCard.isoDate}">
                                ${articleCard.formattedDate}
                            </time>
                        </sly>
                    </footer>
                </div>

            </article>
        </div>
    </sly>

    <div class="article-card article-card--placeholder cq-placeholder"
         data-sly-test="${articleCard.empty}">
        <p>Configure News Item — set a headline and select a category.</p>
    </div>

</sly>
